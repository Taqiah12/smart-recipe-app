name: CI Pipeline

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Run lint
        run: |
          python -m flake8 app.py config.py routes services tests --exclude=venv,__pycache__

      - name: Run tests
        run: |
          pytest -v

      - name: Build Docker image
        run: |
          docker build -t smart-recipe-app .

      - name: Smoke test container
        run: |
          docker run -d --name smart-recipe-app-test -p 5000:5000 \
            -e SUPABASE_URL=dummy \
            -e SUPABASE_KEY=dummy \
            -e GEMINI_API_KEY=dummy \
            smart-recipe-app
          sleep 8
          curl -f http://127.0.0.1:5000/health
          docker stop smart-recipe-app-test